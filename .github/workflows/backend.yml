name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.x'
  PROJECT_PATH: backend/NextGoalWins.Api/NextGoalWins.Api.csproj
  PUBLISH_DIR: backend/publish

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --no-restore -c Release

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --no-build -c Release -o ${{ env.PUBLISH_DIR }}

      - name: Replace config tokens
        run: |
          sed -i "s|#{AZURE_SQL_CONNECTION_STRING}#|${{ secrets.AZURE_SQL_CONNECTION_STRING }}|g" ${{ env.PUBLISH_DIR }}/appsettings.Production.json
          sed -i "s|#{AZURE_SIGNALR_CONNECTION_STRING}#|${{ secrets.AZURE_SIGNALR_CONNECTION_STRING }}|g" ${{ env.PUBLISH_DIR }}/appsettings.Production.json
          sed -i "s|#{FRONTEND_URL}#|${{ secrets.FRONTEND_URL }}|g" ${{ env.PUBLISH_DIR }}/appsettings.Production.json

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_DIR }}
